<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="box">

        <form>
            <h1>Login</h1>
            
            <div>
            <b><label style="display: block; color: deeppink;" for="name">UserName  </label></b>
            <input type="text" id="name" placeholder="Enter your user name"><br><br>
            </div>

            <div>
            <b><label style="display: block; color: deeppink;"  for="pw">Password </label></b>
            <input type="password" id="pw"  placeholder="Enter your password"><br>
            </div>

            <div>
                <b><label for="mail" style="display: block; color: deeppink;">E-mail ID </label></b>
                <input type="email" id="mail" placeholder="Enter your E-mail id"><br>
            </div>


            <button style="width: 100%; height: 40px; font-size:20px; padding: 5px ; margin-top: 20px ; background-color:pink;">Login</button>

        </form>

    </div>

</body>
</html>
